# ============================================================
# grid4earth STAC stack — Kubernetes manifests
# Services: stac-fastapi-geoparquet, stac-browser
# Cluster: OVH GRA9 (js7imo.c1.gra9.k8s.ovh.net)
# ============================================================

---
# ============================================================
# NAMESPACES
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: stac

---
# ============================================================
# STAC-FASTAPI-GEOPARQUET
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: stac-fastapi-geoparquet
  namespace: stac
  labels:
    app: stac-fastapi-geoparquet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stac-fastapi-geoparquet
  template:
    metadata:
      labels:
        app: stac-fastapi-geoparquet
    spec:
      containers:
        - name: stac-fastapi-geoparquet
          image: jeani/stac-fastapi-geoparquet:v0.0.5-ovh
          ports:
            - containerPort: 8000
          env:
            # Public S3 endpoint — no credentials needed for public bucket
            - name: AWS_ENDPOINT_URL
              value: "https://s3.gra.io.cloud.ovh.net"
            - name: AWS_DEFAULT_REGION
              value: "gra"
            # Disable signing for public bucket access
            - name: AWS_NO_SIGN_REQUEST
              value: "YES"
            # Path to the collections index on S3
            - name: STAC_FASTAPI_COLLECTIONS_HREF
              value: "https://grid4earth.s3.gra.io.cloud.ovh.net/public/collections.json"
            # Public-facing root URL of this API
            - name: STAC_FASTAPI_ROOT_HREF
              value: "https://stac-api.grid4earth.eu"
            - name: STAC_FASTAPI_TITLE
              value: "grid4earth STAC API"
            - name: STAC_FASTAPI_DESCRIPTION
              value: "STAC API for grid4earth Sentinel-2 and Sentinel-3 HEALPix data"
            - name: UVICORN_HOST
              value: "0.0.0.0"
            - name: AWS_ANON
              value: "true"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: stac-fastapi-geoparquet
  namespace: stac
spec:
  selector:
    app: stac-fastapi-geoparquet
  ports:
    - port: 80
      targetPort: 8000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stac-fastapi-geoparquet
  namespace: stac
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-jupyterhub"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # CORS — allow stac-browser and gridlook (GitHub Pages) to call this API
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://stac-browser.grid4earth.eu,https://grid4earth.github.io"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
spec:
  ingressClassName: nginx-jupyterhub
  tls:
    - hosts:
        - stac-api.grid4earth.eu
      secretName: stac-api-tls
  rules:
    - host: stac-api.grid4earth.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stac-fastapi-geoparquet
                port:
                  number: 80

---
# ============================================================
# STAC-BROWSER
# ============================================================
# Custom build of Radiant Earth STAC Browser with Gridlook plugin
# Image: ghcr.io/j34ni/stac-browser:gridlook
# Source: https://github.com/GRID4EARTH/stac-browser/tree/gridlook-asset-action
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: stac-browser
  namespace: stac
  labels:
    app: stac-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stac-browser
  template:
    metadata:
      labels:
        app: stac-browser
    spec:
      containers:
        - name: stac-browser
          image: ghcr.io/j34ni/stac-browser:gridlook
          ports:
            - containerPort: 8080
          env:
            # Point the browser at our STAC API
            - name: SB_catalogUrl
              value: "https://stac-api.grid4earth.eu"
            # Optional: display name
            - name: SB_catalogTitle
              value: "grid4earth"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: stac-browser
  namespace: stac
spec:
  selector:
    app: stac-browser
  ports:
    - port: 80
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stac-browser
  namespace: stac
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-jupyterhub"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx-jupyterhub
  tls:
    - hosts:
        - stac-browser.grid4earth.eu
      secretName: stac-browser-tls
  rules:
    - host: stac-browser.grid4earth.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stac-browser
                port:
                  number: 80
