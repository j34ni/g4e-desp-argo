# ============================================================
# grid4earth STAC stack — Kubernetes manifests
# Services: stac-fastapi-geoparquet, stac-browser, gridlook
# Cluster: OVH GRA9 (js7imo.c1.gra9.k8s.ovh.net)
# ============================================================

---
# ============================================================
# NAMESPACES
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: stac

---
apiVersion: v1
kind: Namespace
metadata:
  name: gridlook

---
# ============================================================
# STAC-FASTAPI-GEOPARQUET
# ============================================================
# NOTE: deployment is currently BLOCKED until Justus has
# produced collections.json + GeoParquet files on S3.
# The manifest is ready — just apply when files are in place.
#
# Public S3 base URL: https://grid4earth.s3.gra.io.cloud.ovh.net
# GeoParquet files expected at: /public/sentinel-2-l2a/
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: stac-fastapi-geoparquet
  namespace: stac
  labels:
    app: stac-fastapi-geoparquet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stac-fastapi-geoparquet
  template:
    metadata:
      labels:
        app: stac-fastapi-geoparquet
    spec:
      containers:
        - name: stac-fastapi-geoparquet
          image: jeani/stac-fastapi-geoparquet:v0.0.5-ovh
          ports:
            - containerPort: 8000
          env:
            # Public S3 endpoint — no credentials needed for public bucket
            - name: AWS_ENDPOINT_URL
              value: "https://s3.gra.io.cloud.ovh.net"
            - name: AWS_DEFAULT_REGION
              value: "gra"
            # Disable signing for public bucket access
            - name: AWS_NO_SIGN_REQUEST
              value: "YES"
            # Path to the collections index on S3
            - name: STAC_FASTAPI_COLLECTIONS_HREF
              value: "https://grid4earth.s3.gra.io.cloud.ovh.net/public/collections.json"
            # Public-facing root URL of this API
            - name: STAC_FASTAPI_ROOT_HREF
              value: "https://stac-api.grid4earth.eu"
            - name: STAC_FASTAPI_TITLE
              value: "grid4earth STAC API"
            - name: STAC_FASTAPI_DESCRIPTION
              value: "STAC API for grid4earth Sentinel-2 and Sentinel-3 HEALPix data"
            - name: UVICORN_HOST
              value: "0.0.0.0"
            - name: AWS_ANON
              value: "true"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: stac-fastapi-geoparquet
  namespace: stac
spec:
  selector:
    app: stac-fastapi-geoparquet
  ports:
    - port: 80
      targetPort: 8000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stac-fastapi-geoparquet
  namespace: stac
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-jupyterhub"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # CORS — allow stac-browser and gridlook to call this API
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://stac-browser.grid4earth.eu,https://gridlook.grid4earth.eu"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
spec:
  ingressClassName: nginx-jupyterhub
  tls:
    - hosts:
        - stac-api.grid4earth.eu
      secretName: stac-api-tls
  rules:
    - host: stac-api.grid4earth.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stac-fastapi-geoparquet
                port:
                  number: 80

---
# ============================================================
# STAC-BROWSER
# ============================================================
# Radiant Earth STAC Browser — static React app
# Configured to point at our stac-fastapi-geoparquet endpoint
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: stac-browser
  namespace: stac
  labels:
    app: stac-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stac-browser
  template:
    metadata:
      labels:
        app: stac-browser
    spec:
      containers:
        - name: stac-browser
          image: ghcr.io/radiantearth/stac-browser:latest
          ports:
            - containerPort: 8080
          env:
            # Point the browser at our STAC API
            - name: SB_catalogUrl
              value: "https://stac-api.grid4earth.eu"
            # Optional: display name
            - name: SB_catalogTitle
              value: "grid4earth"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: stac-browser
  namespace: stac
spec:
  selector:
    app: stac-browser
  ports:
    - port: 80
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stac-browser
  namespace: stac
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-jupyterhub"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx-jupyterhub
  tls:
    - hosts:
        - stac-browser.grid4earth.eu
      secretName: stac-browser-tls
  rules:
    - host: stac-browser.grid4earth.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stac-browser
                port:
                  number: 80

---
# ============================================================
# GRIDLOOK
# ============================================================
# NOTE: Gridlook's exact Docker image and configuration
# need to be confirmed. The manifest below uses a placeholder
# image — update image: and env: once confirmed with Justus.
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gridlook
  namespace: gridlook
  labels:
    app: gridlook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gridlook
  template:
    metadata:
      labels:
        app: gridlook
    spec:
      containers:
        - name: gridlook
          # TODO: confirm correct image with Justus
          image: ghcr.io/grid4earth/gridlook:latest
          ports:
            - containerPort: 8080
          env:
            # STAC API endpoint for Gridlook to query
            - name: STAC_API_URL
              value: "https://stac-api.grid4earth.eu"
            # Public S3 base URL for asset access
            - name: S3_PUBLIC_URL
              value: "https://grid4earth.s3.gra.io.cloud.ovh.net"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: gridlook
  namespace: gridlook
spec:
  selector:
    app: gridlook
  ports:
    - port: 80
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gridlook
  namespace: gridlook
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-jupyterhub"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx-jupyterhub
  tls:
    - hosts:
        - gridlook.grid4earth.eu
      secretName: gridlook-tls
  rules:
    - host: gridlook.grid4earth.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gridlook
                port:
                  number: 80
